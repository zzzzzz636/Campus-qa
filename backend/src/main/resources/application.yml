server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: campus-qa-backend
  datasource:
    url: jdbc:sqlite:../database/campusqa.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: file:../database/schema.sql
      data-locations: file:../database/sample-data.sql
