<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>查询结果 - 校园生活百事通</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">校园生活百事通</a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="contribute.html">补充问题</a>
      <a href="login.html">管理员登录</a>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>用户问题</h2>
      <p id="questionText">图书馆什么时候开放？</p>
    </section>

    <section class="panel">
      <h2>匹配答案</h2>
      <p id="matchedQuestion">正在查询...</p>
      <p id="answerText">请稍候，系统正在从 FAQ 知识库中检索答案。</p>
      <div class="result-meta" id="resultMeta">
        <span class="tag" id="categoryTag">分类：-</span>
        <span class="tag green" id="sourceTag">来源：-</span>
        <span class="tag orange" id="viewCountTag">查询次数：-</span>
      </div>
      <div class="actions" id="notFoundActions" style="display: none; margin-top: 16px;">
        <a class="button" href="contribute.html">提交问答建议</a>
      </div>
    </section>

    <section class="panel">
      <h2>相关推荐</h2>
      <table class="table">
        <tbody>
          <tr>
            <td><a href="result.html?q=图书馆怎么借书">图书馆怎么借书？</a></td>
            <td>借阅流程、借阅数量和归还规则。</td>
          </tr>
          <tr>
            <td><a href="result.html?q=图书馆座位需要预约吗">图书馆座位需要预约吗？</a></td>
            <td>座位预约入口和使用规则。</td>
          </tr>
          <tr>
            <td><a href="result.html?q=校园卡丢了怎么办">校园卡丢了怎么办？</a></td>
            <td>校园卡挂失和补办流程。</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="panel">
      <h2>反馈</h2>
      <div class="actions">
        <button class="button secondary" type="button">有帮助</button>
        <a class="button" href="contribute.html">未解决，补充问题</a>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");
    const questionText = document.getElementById("questionText");
    const matchedQuestion = document.getElementById("matchedQuestion");
    const answerText = document.getElementById("answerText");
    const categoryTag = document.getElementById("categoryTag");
    const sourceTag = document.getElementById("sourceTag");
    const viewCountTag = document.getElementById("viewCountTag");
    const notFoundActions = document.getElementById("notFoundActions");

    if (q) {
      questionText.textContent = q;
      loadAnswer(q);
    } else {
      questionText.textContent = "未输入问题";
      showNotFound("请输入要查询的问题。");
    }

    async function loadAnswer(question) {
      try {
        const response = await fetch(`/api/qa/search?question=${encodeURIComponent(question)}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (!data.found) {
          showNotFound(data.message || "暂未找到相关答案，请尝试换个关键词或提交问答建议。");
          return;
        }

        matchedQuestion.textContent = data.question || "已匹配到相关问题";
        answerText.textContent = data.answer || "";
        categoryTag.textContent = `分类：${data.category || "-"}`;
        sourceTag.textContent = `来源：${data.source || "-"}`;
        viewCountTag.textContent = `查询次数：${data.viewCount ?? 0}`;
        notFoundActions.style.display = "none";
      } catch (error) {
        matchedQuestion.textContent = "查询失败";
        answerText.textContent = "后端服务暂不可用，请确认 Spring Boot 已启动。";
        categoryTag.textContent = "分类：-";
        sourceTag.textContent = "来源：-";
        viewCountTag.textContent = "查询次数：-";
        notFoundActions.style.display = "none";
      }
    }

    function showNotFound(message) {
      matchedQuestion.textContent = "未找到匹配答案";
      answerText.textContent = message || "暂未找到相关答案，请尝试换个关键词或提交问答建议。";
      categoryTag.textContent = "分类：-";
      sourceTag.textContent = "来源：-";
      viewCountTag.textContent = "查询次数：0";
      notFoundActions.style.display = "flex";
    }
  </script>
</body>
</html>
