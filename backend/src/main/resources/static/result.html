<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>查询结果 - 校园生活百事通</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">校园生活百事通</a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="contribute.html">补充问题</a>
      <a href="login.html">管理员登录</a>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>用户问题</h2>
      <p id="questionText">图书馆什么时候开放？</p>
    </section>

    <section class="panel">
      <h2 id="resultSectionTitle">匹配答案</h2>
      <h3 id="matchedQuestion" style="margin-bottom: 12px; color: var(--primary);">正在查询...</h3>
      <div id="answerText" style="line-height: 1.9; white-space: pre-wrap;">请稍候，系统正在从 FAQ 知识库中检索答案。</div>
      <div class="result-meta" id="resultMeta" style="margin-top: 18px;">
        <span class="tag" id="matchTypeTag">匹配方式：-</span>
        <span class="tag" id="categoryTag">分类：-</span>
        <span class="tag green" id="sourceTag">来源：-</span>
        <span class="tag orange" id="viewCountTag">查询次数：-</span>
      </div>
      <div class="actions" id="sourceLinkAction" style="display: none; margin-top: 16px;">
        <a class="button" id="sourceLinkButton" href="#" target="_blank" rel="noreferrer">查看原文</a>
      </div>
      <div class="actions" id="notFoundActions" style="display: none; margin-top: 16px;">
        <a class="button" href="contribute.html">补充问题</a>
      </div>
    </section>

    <section class="panel">
      <h2>相关推荐</h2>
      <table class="table">
        <tbody>
          <tr>
            <td><a href="result.html?q=图书馆怎么借书">图书馆怎么借书？</a></td>
            <td>借阅流程、借阅数量和归还规则。</td>
          </tr>
          <tr>
            <td><a href="result.html?q=图书馆座位需要预约吗">图书馆座位需要预约吗？</a></td>
            <td>座位预约入口和使用规则。</td>
          </tr>
          <tr>
            <td><a href="result.html?q=校园卡丢了怎么办">校园卡丢了怎么办？</a></td>
            <td>校园卡挂失和补办流程。</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="panel">
      <h2>反馈</h2>
      <div class="actions">
        <button class="button secondary" id="helpfulButton" type="button">有帮助</button>
        <a class="button" href="contribute.html">未解决，补充问题</a>
      </div>
      <div class="notice" id="feedbackMessage" style="display: none; margin-top: 14px;"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");
    const questionText = document.getElementById("questionText");
    const resultSectionTitle = document.getElementById("resultSectionTitle");
    const matchedQuestion = document.getElementById("matchedQuestion");
    const answerText = document.getElementById("answerText");
    const matchTypeTag = document.getElementById("matchTypeTag");
    const categoryTag = document.getElementById("categoryTag");
    const sourceTag = document.getElementById("sourceTag");
    const viewCountTag = document.getElementById("viewCountTag");
    const sourceLinkAction = document.getElementById("sourceLinkAction");
    const sourceLinkButton = document.getElementById("sourceLinkButton");
    const notFoundActions = document.getElementById("notFoundActions");
    const helpfulButton = document.getElementById("helpfulButton");
    const feedbackMessage = document.getElementById("feedbackMessage");

    helpfulButton.addEventListener("click", () => {
      helpfulButton.disabled = true;
      showFeedbackMessage("感谢反馈，已记录本次结果有帮助。", "success");
    });

    if (q) {
      questionText.textContent = q;
      loadAnswer(q);
    } else {
      questionText.textContent = "未输入问题";
      showNotFound("请输入要查询的问题。");
    }

    async function loadAnswer(question) {
      matchedQuestion.textContent = "正在查询...";
      answerText.textContent = "请稍候，系统正在检索 FAQ 知识库和校园资料库。";
      matchTypeTag.textContent = "匹配方式：查询中";
      categoryTag.textContent = "分类：-";
      sourceTag.textContent = "来源：-";
      viewCountTag.textContent = "查询次数：-";
      notFoundActions.style.display = "none";

      try {
        const response = await fetch(`/api/qa/search?question=${encodeURIComponent(question)}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        const data = payload.data || payload;
        const sourceType = data.sourceType || (data.found ? "FAQ" : "NONE");

        if (sourceType === "FAQ" && data.found !== false) {
          showFaqResult(data);
          return;
        }

        if (sourceType === "KNOWLEDGE_DOC" && data.found !== false) {
          showKnowledgeResult(data);
          return;
        }

        showNotFound(data.message || data.answer || "暂未找到相关答案，请尝试换个关键词或提交问答建议。");
      } catch (error) {
        matchedQuestion.textContent = "查询失败";
        answerText.textContent = "后端服务暂不可用，请确认 Spring Boot 已启动。";
        matchTypeTag.textContent = "匹配方式：-";
        categoryTag.textContent = "分类：-";
        sourceTag.textContent = "来源：-";
        viewCountTag.textContent = "查询次数：-";
        notFoundActions.style.display = "none";
        showFeedbackMessage("查询失败，请启动后端后重试。", "error");
      }
    }

    function showFaqResult(data) {
      resultSectionTitle.textContent = "匹配答案";
      matchedQuestion.textContent = data.question || "已匹配到相关问题";
      answerText.textContent = data.answer || "";
      matchTypeTag.textContent = "匹配方式：FAQ 知识库匹配";
      categoryTag.textContent = `分类：${data.category || "-"}`;
      sourceTag.textContent = `来源：${data.source || "-"}`;
      viewCountTag.textContent = `查询次数：${data.viewCount ?? 0}`;
      sourceLinkAction.style.display = "none";
      notFoundActions.style.display = "none";
    }

    function showKnowledgeResult(data) {
      resultSectionTitle.textContent = "校园资料匹配结果";
      matchedQuestion.textContent = data.question || data.input || "已匹配到校园资料";
      answerText.textContent = data.answer || "已从校园资料库找到相关内容。";
      matchTypeTag.textContent = "匹配方式：校园资料库匹配";
      categoryTag.textContent = `分类：${data.category || "-"}`;
      viewCountTag.textContent = `查询次数：${data.viewCount ?? 0}`;
      // 显示查看原文按钮
      const sourceUrl = data.sourceUrl || (data.data && data.data.sourceUrl);
      if (sourceUrl) {
        sourceLinkButton.href = sourceUrl;
        sourceLinkAction.style.display = "flex";
      } else {
        sourceLinkAction.style.display = "none";
      }
      sourceTag.innerHTML = buildSourceHtml(data);
      notFoundActions.style.display = "none";
    }

    function showNotFound(message) {
      resultSectionTitle.textContent = "匹配答案";
      matchedQuestion.textContent = "暂未找到相关答案";
      answerText.textContent = message || "暂未找到相关答案，请尝试换个关键词或提交问答建议。";
      matchTypeTag.textContent = "匹配方式：未命中";
      categoryTag.textContent = "分类：-";
      sourceTag.textContent = "来源：-";
      viewCountTag.textContent = "查询次数：0";
      sourceLinkAction.style.display = "none";
      notFoundActions.style.display = "flex";
    }

    function showFeedbackMessage(message, type) {
      feedbackMessage.textContent = message;
      feedbackMessage.className = `notice ${type || ""}`;
      feedbackMessage.style.display = "block";
    }

    function buildSourceHtml(data) {
      if (data.sourceUrl) {
        const url = escapeHtml(data.sourceUrl);
        return `来源：<a href="${url}" target="_blank" rel="noreferrer">${url}</a>`;
      }

      return `来源：${escapeHtml(data.source || "-")}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
