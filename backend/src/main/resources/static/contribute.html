<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>补充问题 - 校园生活百事通</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">校园生活百事通</a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a class="active" href="contribute.html">补充问题</a>
      <a href="login.html">管理员登录</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>提交问答建议</h1>
      <p>学生提交的新问题会进入待审核列表，管理员审核通过后再进入 FAQ 知识库。</p>
    </section>

    <section class="panel">
      <form class="form" id="contributionForm">
        <div class="form-row">
          <label for="question">问题</label>
          <input class="input" id="question" placeholder="例如：宿舍水电费在哪里查询？">
        </div>
        <div class="form-row">
          <label for="answer">建议答案</label>
          <textarea class="textarea" id="answer" placeholder="可以填写你知道的答案，也可以留空等待管理员补充。"></textarea>
        </div>
        <div class="form-row">
          <label for="category">分类</label>
          <select class="select" id="category">
            <option>食堂</option>
            <option>图书馆</option>
            <option>宿舍报修</option>
            <option>校园卡</option>
            <option>打印</option>
            <option>社团</option>
          </select>
        </div>
        <button class="button" id="submitButton" type="submit">提交，等待管理员审核</button>
        <div class="notice" id="submitMessage" style="display: none;"></div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("contributionForm");
    const questionInput = document.getElementById("question");
    const answerInput = document.getElementById("answer");
    const categoryInput = document.getElementById("category");
    const submitButton = document.getElementById("submitButton");
    const submitMessage = document.getElementById("submitMessage");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const question = questionInput.value.trim();
      const suggestedAnswer = answerInput.value.trim();
      const category = categoryInput.value.trim();

      if (!question) {
        showMessage("请输入问题");
        return;
      }

      submitButton.disabled = true;
      showMessage("正在提交...");

      try {
        const response = await fetch("/api/contribution/add", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question,
            suggestedAnswer,
            category
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (!data.success) {
          showMessage(data.message || "提交失败");
          return;
        }

        showMessage(data.message || "提交成功，等待管理员审核");
        form.reset();
      } catch (error) {
        showMessage("提交失败，请确认后端服务已启动。");
      } finally {
        submitButton.disabled = false;
      }
    });

    function showMessage(message) {
      submitMessage.textContent = message;
      submitMessage.style.display = "block";
    }
  </script>
</body>
</html>
