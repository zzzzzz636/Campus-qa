<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台管理 - 校园生活百事通</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">校园生活百事通</a>
    <nav class="nav">
      <a href="index.html">学生端</a>
      <a class="active" href="admin.html">FAQ 管理</a>
      <a href="login.html">退出</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>管理员后台</h1>
      <p>第一周静态原型展示 FAQ 管理、贡献审核、知识导入和热门问题统计入口。</p>
    </section>

    <section class="panel">
      <div class="toolbar">
        <h2>FAQ 管理</h2>
        <div class="actions">
          <input class="input" placeholder="搜索 FAQ">
          <button class="button" type="button">新增 FAQ</button>
        </div>
      </div>
      <table class="table">
        <thead>
          <tr>
            <th>问题</th>
            <th>分类</th>
            <th>来源</th>
            <th>查询次数</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="faqTableBody">
          <tr>
            <td colspan="5">正在加载 FAQ 数据...</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="grid">
      <div class="card">
        <h3>贡献审核</h3>
        <p id="pendingSummary">正在加载待审核贡献...</p>
      </div>
      <div class="card">
        <h3>知识导入</h3>
        <p>选择 CSV 文件批量导入 FAQ，字段包含问题、答案、分类、来源。</p>
      </div>
      <div class="card">
        <h3>热门统计</h3>
        <p>根据查询日志展示问题排行榜和分类统计。</p>
      </div>
    </section>

    <section class="panel">
      <h2>待审核贡献</h2>
      <table class="table">
        <thead>
          <tr>
            <th>问题</th>
            <th>建议答案</th>
            <th>分类</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="contributionTableBody">
          <tr>
            <td colspan="4">正在加载待审核贡献...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const faqTableBody = document.getElementById("faqTableBody");
    const contributionTableBody = document.getElementById("contributionTableBody");
    const pendingSummary = document.getElementById("pendingSummary");

    loadFaqList();
    loadPendingContributions();
    setInterval(loadPendingContributions, 5000);

    async function loadFaqList() {
      try {
        const response = await fetch("/api/faq/list");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const faqs = await response.json();
        if (!Array.isArray(faqs) || faqs.length === 0) {
          faqTableBody.innerHTML = '<tr><td colspan="5">暂无 FAQ 数据</td></tr>';
          return;
        }

        faqTableBody.innerHTML = faqs.map(renderFaqRow).join("");
      } catch (error) {
        faqTableBody.innerHTML = '<tr><td colspan="5">FAQ 数据加载失败，请确认后端服务已启动。</td></tr>';
      }
    }

    function renderFaqRow(faq) {
      return `
        <tr>
          <td>${escapeHtml(faq.question || "")}</td>
          <td>${escapeHtml(faq.category || "-")}</td>
          <td>${escapeHtml(faq.source || "-")}</td>
          <td>${faq.viewCount ?? 0}</td>
          <td>
            <button class="small-button primary" type="button">编辑</button>
            <button class="small-button danger" type="button">删除</button>
          </td>
        </tr>
      `;
    }

    async function loadPendingContributions() {
      try {
        const response = await fetch("/api/contribution/pending");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const contributions = await response.json();
        if (!Array.isArray(contributions) || contributions.length === 0) {
          contributionTableBody.innerHTML = '<tr><td colspan="4">暂无待审核贡献</td></tr>';
          pendingSummary.textContent = "暂无待审核贡献。";
          return;
        }

        contributionTableBody.innerHTML = contributions.map(renderContributionRow).join("");
        pendingSummary.textContent = `待审核 ${contributions.length} 条，可通过或拒绝学生提交的问答建议。`;
      } catch (error) {
        contributionTableBody.innerHTML = '<tr><td colspan="4">待审核贡献加载失败，请确认后端服务已启动。</td></tr>';
        pendingSummary.textContent = "待审核贡献加载失败，请确认后端服务已启动。";
      }
    }

    function renderContributionRow(contribution) {
      return `
        <tr>
          <td>${escapeHtml(contribution.question || "")}</td>
          <td>${escapeHtml(contribution.suggestedAnswer || "-")}</td>
          <td>${escapeHtml(contribution.category || "-")}</td>
          <td>
            <button class="small-button primary" type="button">通过</button>
            <button class="small-button danger" type="button">拒绝</button>
          </td>
        </tr>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
