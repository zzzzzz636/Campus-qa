<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员登录 - 校园生活百事通</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">校园生活百事通</a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="contribute.html">补充问题</a>
      <a class="active" href="login.html">管理员登录</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>管理员登录</h1>
      <p>后台用于维护 FAQ、审核学生贡献内容和导入知识资料。</p>
    </section>

    <section class="panel">
      <form class="form" id="loginForm" action="admin.html">
        <div class="form-row">
          <label for="username">账号</label>
          <input class="input" id="username" value="admin">
        </div>
        <div class="form-row">
          <label for="password">密码</label>
          <input class="input" id="password" type="password" value="admin123">
        </div>
        <button class="button" type="submit">登录</button>
        <div class="notice" id="loginMessage" style="display: none;"></div>
      </form>
    </section>
  </main>

  <script>
    const loginForm = document.getElementById("loginForm");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginMessage = document.getElementById("loginMessage");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!username || !password) {
        showMessage("请输入账号和密码");
        return;
      }

      try {
        const response = await fetch("/api/admin/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (data.success) {
          window.location.href = "admin.html";
          return;
        }

        showMessage(data.message || "账号或密码错误");
      } catch (error) {
        showMessage("后端服务暂不可用，请确认 Spring Boot 已启动。");
      }
    });

    function showMessage(message) {
      loginMessage.textContent = message;
      loginMessage.style.display = "block";
    }
  </script>
</body>
</html>
